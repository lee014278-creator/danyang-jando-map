<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단양 잔도길 주변 가볼만한곳 지도</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root {
      --bg:#fbf8f2;
      --card:#ffffff;
      --text:#352c24;
      --muted:#74685e;
      --line:#e8dccd;
      --soft:#f1e5d4;
      --soft2:#ead8c0;
      --point:#7b5737;
      --dark:#3f2917;
    }

    * { box-sizing:border-box; }

    html, body {
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
      line-height:1.42;
    }

    .wrap {
      width:min(1120px,100%);
      margin:0 auto;
      padding:5px 7px 14px;
    }

    .head {
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:4px 7px;
      margin-bottom:4px;
    }

    .head h1 {
      margin:0;
      font-size:clamp(12px,2.2vw,16px);
      letter-spacing:-.04em;
      line-height:1.2;
    }

    .head p {
      margin:1px 0 0;
      color:var(--muted);
      font-size:10px;
    }

    .filters {
      display:flex;
      gap:5px;
      overflow-x:auto;
      padding:2px 0 5px;
      -webkit-overflow-scrolling:touch;
    }

    .filter-btn {
      flex:0 0 auto;
      border:1px solid var(--soft2);
      background:#fffaf2;
      color:var(--text);
      border-radius:999px;
      padding:4px 8px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      line-height:1.15;
    }

    .filter-btn.active {
      background:var(--point);
      color:#fff;
      border-color:var(--point);
    }

    .map-box {
      position:relative;
      height:310px;
      min-height:310px;
      max-height:310px;
      overflow:hidden;
      border-radius:15px;
      border:1px solid var(--line);
      background:#efe5d8;
      box-shadow:0 8px 20px rgba(72,52,32,.13);
    }

    #map {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:#efe5d8;
      z-index:1;
    }

    .leaflet-container {
      font-family:inherit;
      cursor:default !important;
    }

    .leaflet-control-attribution {
      font-size:9px;
    }

    .map-guide {
      position:absolute;
      left:8px;
      top:8px;
      z-index:800;
      background:rgba(255,250,242,.96);
      border:1px solid var(--soft2);
      color:var(--dark);
      border-radius:999px;
      padding:4px 8px;
      font-size:11px;
      font-weight:900;
      pointer-events:none;
      box-shadow:0 4px 12px rgba(74,54,35,.12);
    }

    .marker-layer {
      position:absolute;
      inset:0;
      z-index:700;
      pointer-events:none;
    }

    .place-btn {
      position:absolute;
      transform:translate(-50%, -50%);
      border:0;
      padding:0;
      background:transparent;
      cursor:pointer;
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:4px;
      white-space:nowrap;
    }

    .pin {
      width:28px;
      height:28px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--point);
      color:#fff;
      font-size:13px;
      font-weight:900;
      border:3px solid #fff;
      box-shadow:0 4px 12px rgba(64,41,22,.25);
      flex:0 0 auto;
      z-index:2;
    }

    .label {
      min-height:23px;
      max-width:150px;
      padding:4px 7px;
      border-radius:999px;
      background:rgba(255,250,242,.97);
      border:1px solid #e3d0b7;
      color:var(--dark);
      font-size:11px;
      font-weight:900;
      line-height:1.15;
      white-space:nowrap;
      box-shadow:0 4px 12px rgba(64,41,22,.14);
      z-index:1;
    }

    .place-btn.selected .pin {
      width:32px;
      height:32px;
      background:var(--dark);
      font-size:14px;
    }

    .place-btn.selected .label {
      background:#fff;
      border-color:var(--point);
    }

    /* 전체 보기 기준 수동 배치 */
    .p1 { left:20%; top:45%; flex-direction:row-reverse; }
    .p2 { left:25%; top:64%; flex-direction:column; gap:3px; }
    .p3 { left:52%; top:36%; }
    .p4 { left:46%; top:58%; flex-direction:row-reverse; }
    .p5 { left:65%; top:50%; }
    .p6 { left:77%; top:30%; flex-direction:column-reverse; gap:3px; }
    .p7 { left:38%; top:18%; }
    .p8 { left:82%; top:68%; }

    .p2 .label { max-width:160px; }
    .p6 .label { max-width:120px; }

    .cards {
      margin-top:7px;
    }

    .cards h2 {
      margin:0 0 5px;
      font-size:16px;
      letter-spacing:-.03em;
    }

    .list {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px;
      box-shadow:0 5px 14px rgba(74,54,35,.07);
      cursor:pointer;
    }

    .card.selected {
      order:-1;
      border:2px solid var(--point);
      box-shadow:0 8px 18px rgba(74,54,35,.16);
    }

    .top {
      display:flex;
      gap:7px;
      align-items:flex-start;
    }

    .card-num {
      width:26px;
      height:26px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--point);
      color:#fff;
      font-size:13px;
      font-weight:900;
      flex:0 0 auto;
    }

    .name {
      margin:0;
      font-size:15px;
      letter-spacing:-.04em;
      line-height:1.25;
    }

    .desc {
      margin:2px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
    }

    .btn-row {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:7px;
    }

    .link {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:6px 9px;
      border-radius:10px;
      text-decoration:none;
      font-size:12px;
      font-weight:900;
      background:var(--soft);
      color:var(--dark);
      border:1px solid var(--soft2);
    }

    .link.primary {
      background:var(--point);
      color:#fff;
      border-color:var(--point);
    }

    .note {
      margin:8px 2px 0;
      color:var(--muted);
      font-size:11px;
    }

    .load-error {
      display:none;
      margin-top:8px;
      padding:12px;
      background:#fff7ec;
      border:1px solid #e3c8a4;
      border-radius:12px;
      color:var(--dark);
      font-weight:800;
      font-size:13px;
    }

    @media (max-width:720px) {
      .wrap { padding:5px 6px 14px; }

      .map-box {
        height:300px;
        min-height:300px;
        max-height:300px;
      }

      .filter-btn {
        padding:4px 7px;
        font-size:13px;
      }

      .label {
        max-width:126px;
        font-size:10px;
        padding:4px 6px;
      }

      .p1 { left:18%; top:44%; }
      .p2 { left:24%; top:64%; }
      .p3 { left:54%; top:36%; }
      .p4 { left:47%; top:59%; }
      .p5 { left:64%; top:50%; }
      .p6 { left:78%; top:30%; }
      .p7 { left:40%; top:18%; }
      .p8 { left:82%; top:69%; }

      .list {
        grid-template-columns:1fr;
        gap:7px;
      }

      .card {
        padding:8px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="head">
      <h1>단양 잔도길 주변 가볼만한곳 지도</h1>
      <p>마커를 누르면 아래 장소 카드가 맨 위로 올라옵니다.</p>
    </section>

    <nav class="filters" id="filters" aria-label="장소 필터"></nav>

    <section class="map-box" aria-label="단양 잔도길 주변 지도">
      <div id="map"></div>
      <div class="map-guide">번호를 눌러보세요</div>
      <div class="marker-layer" id="markerLayer"></div>
    </section>

    <div class="load-error" id="loadError">지도가 뜨지 않으면 새로고침해 주세요.</div>

    <section class="cards">
      <h2>장소 목록</h2>
      <div class="list" id="placeList"></div>
      <p class="note">네이버지도는 장소 검색 링크로 연결됩니다. 주소 표기는 카드에서 제외했습니다.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const filters = [
      { key:"all", label:"전체" },
      { key:"jando", label:"잔도길 주변" },
      { key:"view", label:"전망·야경" },
      { key:"indoor", label:"시장·실내" },
      { key:"eight", label:"단양팔경" }
    ];

    const places = [
      {
        id:"danyang-jando",
        no:1,
        markerClass:"p1",
        name:"단양강 잔도",
        short:"단양강 잔도",
        desc:"남한강 절벽을 따라 걷는 데크 산책길입니다.",
        cats:["jando","view"],
        info:"https://access.visitkorea.or.kr/ms/detail.do?cotId=a72fa897-88cb-46f9-81f6-852e1f391176"
      },
      {
        id:"mancheonha",
        no:2,
        markerClass:"p2",
        name:"만천하스카이워크",
        short:"만천하스카이워크",
        desc:"단양강을 내려다보는 전망 명소입니다.",
        cats:["jando","view"],
        info:"https://www.dytc.or.kr/mancheonha/89"
      },
      {
        id:"suyanggae-light",
        no:3,
        markerClass:"p3",
        name:"수양개빛터널",
        short:"빛터널",
        desc:"밤 코스로 함께 보기 좋은 빛 테마 터널입니다.",
        cats:["jando","view","indoor"],
        info:"https://korean.visitkorea.or.kr/detail/ms_detail.do?cotid=1fb3cc64-aabd-495f-ae45-52b76c162a9f"
      },
      {
        id:"moss-tunnel",
        no:4,
        markerClass:"p4",
        name:"이끼터널",
        short:"이끼터널",
        desc:"수양개빛터널 근처의 사진 명소입니다.",
        cats:["jando","view"],
        info:""
      },
      {
        id:"gugyeong-market",
        no:5,
        markerClass:"p5",
        name:"단양구경시장",
        short:"구경시장",
        desc:"잔도길 산책 후 먹거리 코스로 좋습니다.",
        cats:["indoor"],
        info:"https://www.danyang.go.kr/tour/1944?action=read&action-value=f40c955214202643e20d772efedeebf8&page=1&tags=%EC%8B%9C%EC%9E%A5"
      },
      {
        id:"danuri-aquarium",
        no:6,
        markerClass:"p6",
        name:"다누리아쿠아리움",
        short:"아쿠아리움",
        desc:"비 오는 날 들르기 좋은 실내 관광지입니다.",
        cats:["indoor"],
        info:"https://www.danyang.go.kr/aquarium"
      },
      {
        id:"dodamsambong",
        no:7,
        markerClass:"p7",
        name:"도담삼봉",
        short:"도담삼봉",
        desc:"단양팔경을 대표하는 명소입니다.",
        cats:["eight","view"],
        info:"https://www.danyang.go.kr/tour/1916?action=read&action-value=05bcae251f5da56380fb4c0f473c7f9e&chathead=%EB%8B%A8%EC%96%91%ED%8C%94%EA%B2%BD"
      },
      {
        id:"gosu-cave",
        no:8,
        markerClass:"p8",
        name:"고수동굴",
        short:"고수동굴",
        desc:"여름·겨울에도 들르기 좋은 석회암 동굴입니다.",
        cats:["indoor"],
        info:"https://www.danyang.go.kr/tour/1930?action=read&action-value=ae74518b34cf81c69192192ac4706f49&chathead=%EB%8F%99%EA%B5%B4"
      }
    ];

    let map;
    let currentFilter = "all";
    let selectedId = "danyang-jando";

    const filtersEl = document.getElementById("filters");
    const markerLayer = document.getElementById("markerLayer");
    const placeList = document.getElementById("placeList");

    function naverUrl(name) {
      return "https://map.naver.com/p/search/" + encodeURIComponent(name);
    }

    function visiblePlaces() {
      return currentFilter === "all" ? places : places.filter(p => p.cats.includes(currentFilter));
    }

    function selectedPlace() {
      return places.find(p => p.id === selectedId) || visiblePlaces()[0] || places[0];
    }

    function linkButtons(place) {
      return `
        <a class="link primary" href="${naverUrl(place.name)}" target="_blank" rel="noopener">네이버지도</a>
        ${place.info ? `<a class="link" href="${place.info}" target="_blank" rel="noopener">관광 정보</a>` : ""}
      `;
    }

    function renderFilters() {
      filtersEl.innerHTML = "";
      filters.forEach(filter => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "filter-btn" + (filter.key === currentFilter ? " active" : "");
        btn.textContent = filter.label;
        btn.addEventListener("click", () => {
          currentFilter = filter.key;
          selectedId = visiblePlaces()[0]?.id || selectedId;
          renderAll();
          setMapView();
        });
        filtersEl.appendChild(btn);
      });
    }

    function renderMarkers() {
      markerLayer.innerHTML = "";

      visiblePlaces().forEach(place => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "place-btn " + place.markerClass + (place.id === selectedId ? " selected" : "");
        btn.innerHTML = `
          <span class="pin">${place.no}</span>
          <span class="label">${place.short}</span>
        `;
        btn.addEventListener("click", () => selectPlace(place.id));
        markerLayer.appendChild(btn);
      });
    }

    function renderCards() {
      const selected = selectedPlace();
      const sorted = [...visiblePlaces()].sort((a,b) => {
        if (a.id === selected.id) return -1;
        if (b.id === selected.id) return 1;
        return a.no - b.no;
      });

      placeList.innerHTML = "";

      sorted.forEach(place => {
        const card = document.createElement("article");
        card.className = "card" + (place.id === selected.id ? " selected" : "");
        card.innerHTML = `
          <div class="top">
            <span class="card-num">${place.no}</span>
            <div>
              <h3 class="name">${place.name}</h3>
              <p class="desc">${place.desc}</p>
            </div>
          </div>
          <div class="btn-row">${linkButtons(place)}</div>
        `;
        card.addEventListener("click", () => selectPlace(place.id));
        placeList.appendChild(card);
      });
    }

    function selectPlace(id) {
      selectedId = id;
      renderAll();
    }

    function setMapView() {
      if (!map) return;

      if (currentFilter === "jando") {
        map.setView([36.9768, 128.3490], 14, { animate:false });
      } else if (currentFilter === "indoor") {
        map.setView([36.9863, 128.3740], 14, { animate:false });
      } else if (currentFilter === "eight") {
        map.setView([36.9989, 128.3444], 14, { animate:false });
      } else {
        map.setView([36.9855, 128.3605], 13, { animate:false });
      }

      setTimeout(() => map.invalidateSize(false), 100);
    }

    function lockMap() {
      map.dragging.disable();
      map.scrollWheelZoom.disable();
      map.doubleClickZoom.disable();
      map.touchZoom.disable();
      map.boxZoom.disable();
      map.keyboard.disable();

      const el = map.getContainer();
      el.addEventListener("wheel", e => e.preventDefault(), { passive:false });
      el.addEventListener("dblclick", e => e.preventDefault());
      el.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
    }

    function renderAll() {
      renderFilters();
      renderMarkers();
      renderCards();
    }

    function init() {
      if (typeof L === "undefined") {
        document.getElementById("loadError").style.display = "block";
        return;
      }

      map = L.map("map", {
        zoomControl:false,
        attributionControl:true,
        dragging:false,
        scrollWheelZoom:false,
        doubleClickZoom:false,
        touchZoom:false,
        boxZoom:false,
        keyboard:false
      });

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom:18,
        attribution:"&copy; OpenStreetMap"
      }).addTo(map);

      lockMap();
      renderAll();
      setMapView();

      window.addEventListener("resize", setMapView);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
